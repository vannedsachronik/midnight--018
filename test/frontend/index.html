<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Midnight Root</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
      h1 { margin-bottom: 24px; }
      .field { margin-bottom: 16px; }
      label { display: block; font-weight: 600; margin-bottom: 4px; }
      label small { font-weight: 400; color: #666; }
      input, textarea { width: 100%; padding: 8px; font-family: monospace; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
      textarea { min-height: 400px; resize: vertical; }
      button { padding: 10px 24px; font-size: 16px; cursor: pointer; background: #2563eb; color: #fff; border: none; border-radius: 6px; }
      button:hover { background: #1d4ed8; }
      pre { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 6px; white-space: pre-wrap; word-break: break-all; font-size: 13px; }
      .error { color: #dc2626; font-weight: 600; }
      code { background: #f0f0f0; padding: 2px 4px; border-radius: 3px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>Sign Midnight Root</h1>
    <div id="app"><p>Connecting wallet…</p></div>
    <script type="module" src="./sign-root.ts"></script>
  </body>
</html>
